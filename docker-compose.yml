services:
  redis:
    image: redis:7.2-alpine
    container_name: blaybum_redis
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: blaybum_redis_password123
    ports:
      - "6379:6379"
    command: redis-server --requirepass blaybum_redis_password123 --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - blaybum_network

  postgres:
    image: postgres:15-alpine
    container_name: blaybum_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: blaybum_db
      POSTGRES_USER: blaybum_user
      POSTGRES_PASSWORD: blaybum_password
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    networks:
      - blaybum_network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: blaybum_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@blaybum.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - blaybum_network
    depends_on:
      - postgres

volumes:
  postgres_data:
  pgadmin_data:
  redis_data:

networks:
  blaybum_network:
    driver: bridge
